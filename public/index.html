<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Ultra</title>
  <style>
    :root {
      --bg-primary: #f0f2f5;
      --sidebar-bg: #ffffff;
      --chat-bg: #efeae2;
      --panel-header: #f0f2f5;
      --text-primary: #111b21;
      --text-secondary: #667781;
      --panel-border: #e9edef;
      --sent-msg: #d9fdd3;
      --received-msg: #ffffff;
      --input-bg: #f0f2f5;
    }
    .dark-theme {
      --bg-primary: #0b141a;
      --sidebar-bg: #111b21;
      --chat-bg: #0b141a;
      --panel-header: #202c33;
      --text-primary: #e9edef;
      --text-secondary: #8696a0;
      --panel-border: #222d34;
      --sent-msg: #005c4b;
      --received-msg: #202c33;
      --input-bg: #2a3942;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-primary); color: var(--text-primary); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .hidden { display: none !important; }
    
    /* Auth Screen */
    #auth-screen { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #00a884 0%, #0b141a 100%); }
    .auth-card { background: var(--sidebar-bg); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 350px; text-align: center; }
    .auth-card h2 { margin-bottom: 24px; color: #00a884; }
    .auth-card input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--panel-border); background: var(--input-bg); color: var(--text-primary); border-radius: 6px; outline: none; }
    .auth-card button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .btn-primary { background: #00a884; color: white; }
    .btn-secondary { background: var(--input-bg); color: var(--text-primary); }

    /* App Layout */
    #app-screen { width: 100vw; height: 100vh; display: flex; }
    #sidebar { width: 380px; background: var(--sidebar-bg); border-right: 1px solid var(--panel-border); display: flex; flex-direction: column; height: 100%; }
    .panel-header { background: var(--panel-header); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .panel-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    
    .tabs-bar { display: flex; background: var(--panel-header); border-bottom: 1px solid var(--panel-border); }
    .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; }
    
    .list-container { flex: 1; overflow-y: auto; }
    .list-item { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--panel-border); cursor: pointer; }
    .list-item:hover { background: var(--input-bg); }
    
    #chat-area { flex: 1; background: var(--chat-bg); display: flex; flex-direction: column; height: 100%; position: relative; }
    .chat-header { background: var(--panel-header); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    
    #messages-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 60%; padding: 8px 12px; border-radius: 8px; position: relative; font-size: 14px; word-break: break-word; }
    .msg.sent { background: var(--sent-msg); align-self: flex-end; border-top-right-radius: 0; }
    .msg.received { background: var(--received-msg); align-self: flex-start; border-top-left-radius: 0; }
    
    .chat-input-bar { background: var(--panel-header); padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
    .chat-input-bar input[type="text"] { flex: 1; padding: 10px 14px; border-radius: 8px; border: none; background: var(--input-bg); color: var(--text-primary); outline: none; }
    
    .btn-logout { background: #ea0038; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .online-dot { width: 10px; height: 10px; background: #25d366; border-radius: 50%; position: absolute; bottom: 2px; left: 28px; border: 2px solid var(--sidebar-bg); }
    
    /* Full Screen Overlays / Modals */
    .overlay-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0b141a; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .video-grid { display: flex; width: 100%; height: 75vh; gap: 10px; padding: 20px; justify-content: center; }
    .video-grid video { width: 45%; height: 100%; object-fit: cover; background: black; border-radius: 12px; }
    
    @media (max-width: 768px) {
      #sidebar { width: 100%; }
      #chat-area.mobile-hidden { display: none; }
      #sidebar.mobile-hidden { display: none; }
      .video-grid { flex-direction: column; }
      .video-grid video { width: 100%; height: 45%; }
    }
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>WhatsApp Ultra</h2>
      <input type="text" id="auth-username" placeholder="Username">
      <input type="password" id="auth-password" placeholder="Password">
      <button class="btn-primary" onclick="authAction('login')">Login</button>
      <button class="btn-secondary" onclick="authAction('register')">Register</button>
    </div>
  </div>

  <!-- App Main Screen -->
  <div id="app-screen" class="hidden">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="panel-header">
        <div style="display:flex; align-items:center; gap:12px;">
          <label title="Change Profile Pic">
            <img id="my-avatar" src="https://www.w3schools.com/howto/img_avatar.png">
            <input type="file" id="profile-pic-input" class="hidden" accept="image/*" onchange="uploadProfilePic(this)">
          </label>
          <span id="current-user-display" style="font-weight:600;"></span>
        </div>
        <div style="display:flex; gap:6px;">
          <button onclick="changePassword()" class="btn-logout" style="background:#00a884;" title="Change Password">🔑</button>
          <button onclick="toggleTheme()" class="btn-logout" style="background:#202c33;" title="Toggle Theme">🌓</button>
          <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
      </div>

      <!-- Add Friend Bar -->
      <div style="padding:10px; background:var(--panel-header); display:flex; gap:6px; border-bottom:1px solid var(--panel-border);">
        <input type="text" id="target-username" placeholder="Add username..." style="flex:1; padding:6px 10px; border-radius:4px; border:none; background:var(--input-bg); color:var(--text-primary); outline:none;">
        <button onclick="sendFriendRequest()" style="background:#00a884; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Add</button>
      </div>

      <!-- Tabs Bar -->
      <div class="tabs-bar">
        <div id="tab-chats-btn" class="tab-btn" onclick="switchTab('chats')" style="color:var(--text-primary); border-bottom:2px solid #00a884;">CHATS</div>
        <div id="tab-status-btn" class="tab-btn" onclick="switchTab('status')">STATUS</div>
        <div id="tab-calls-btn" class="tab-btn" onclick="switchTab('calls')">CALLS</div>
      </div>

      <!-- Content Lists -->
      <div id="friends-list" class="list-container">
        <div id="requests-list"></div>
        <div id="chats-sublist"></div>
      </div>

      <div id="status-view-container" class="list-container hidden">
        <div style="padding:16px;">
          <button onclick="openStatusCreator()" style="width:100%; padding:10px; background:#00a884; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom:12px;">+ Add Text Status</button>
          <input type="file" id="status-media-input" accept="image/*,video/*" class="hidden" onchange="uploadStatusMedia(this)">
          <button onclick="document.getElementById('status-media-input').click()" style="width:100%; padding:10px; background:var(--input-bg); color:var(--text-primary); border:1px solid var(--panel-border); border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom:16px;">📁 Upload Media Status</button>
        </div>
        <div id="statuses-list"></div>
      </div>

      <div id="calls-view-container" class="list-container hidden">
        <div id="calls-list"></div>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-area" class="mobile-hidden">
      <div id="chat-placeholder" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); font-size:16px;">
        Select a chat to start messaging
      </div>

      <div id="active-chat" class="hidden" style="display:flex; flex-direction:column; height:100%;">
        <div class="chat-header">
          <div style="display:flex; align-items:center; gap:12px;">
            <button onclick="toggleSidebar(true)" style="background:none; border:none; color:var(--text-primary); font-size:18px; cursor:pointer; display:none;" class="mobile-back-btn">⬅</button>
            <img id="active-friend-avatar" src="" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
            <div>
              <span id="active-friend-name" style="font-weight:600; display:block;"></span>
              <span id="active-friend-status" style="font-size:11px; color:var(--text-secondary);">Online</span>
            </div>
          </div>
          <div style="display:flex; gap:16px; align-items:center;">
            <span onclick="startCall('audio')" style="cursor:pointer; font-size:20px;" title="Voice Call">📞</span>
            <span onclick="startCall('video')" style="cursor:pointer; font-size:20px;" title="Video Call">📹</span>
            <span onclick="toggleInChatSearch()" style="cursor:pointer; font-size:18px;" title="Search">🔍</span>
            <span onclick="clearFullChat()" style="cursor:pointer; font-size:18px;" title="Clear Chat">🗑️</span>
          </div>
        </div>

        <input type="text" id="in-chat-search" class="hidden" placeholder="Search in chat..." oninput="searchInChat(this.value)" style="padding:8px 16px; background:var(--input-bg); border:none; color:var(--text-primary); outline:none;">

        <div id="messages-display"></div>

        <!-- Reply Preview Bar -->
        <div id="reply-preview-bar" class="hidden" style="background:var(--panel-header); padding:8px 16px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--panel-border);">
          <div style="font-size:13px; color:var(--text-secondary); border-left:3px solid #00a884; padding-left:8px;" id="reply-preview-text"></div>
          <span onclick="cancelReply()" style="cursor:pointer; font-weight:bold; font-size:16px;">&times;</span>
        </div>

        <div class="chat-input-bar">
          <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(this)">
          <span onclick="document.getElementById('file-input').click()" style="cursor:pointer; font-size:20px;" title="Attach File">📎</span>
          <span id="mic-btn" style="cursor:pointer; font-size:20px;" title="Voice Note">🎙️</span>
          <input type="text" id="message-input" placeholder="Type a message" oninput="handleTyping()" onkeypress="if(event.key === 'Enter') sendMessage()">
          <button onclick="sendMessage()" style="background:#00a884; color:white; border:none; padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:bold;">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Incoming Call Modal -->
  <div id="incoming-call-modal" class="overlay-screen hidden" style="background: rgba(0,0,0,0.85);">
    <h2 id="incoming-caller-name" style="margin-bottom:20px;">Incoming Call...</h2>
    <div style="display:flex; gap:20px;">
      <button onclick="acceptIncomingCall()" style="background:#25d366; color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:bold; cursor:pointer;">Accept</button>
      <button onclick="rejectIncomingCall()" style="background:#ea0038; color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:bold; cursor:pointer;">Reject</button>
    </div>
  </div>

  <!-- Active Call Screen -->
  <div id="call-screen" class="overlay-screen hidden">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
      <img id="call-avatar" src="" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
      <div>
        <h3 id="call-username"></h3>
        <span id="call-status-text" style="color:#25d366; font-size:14px;">Calling...</span>
      </div>
    </div>

    <div id="video-container" class="video-grid hidden">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div style="display:flex; gap:20px; margin-top:30px;">
      <button id="mute-btn" onclick="toggleMute()" style="background:#ffffff33; border:none; width:50px; height:50px; border-radius:50%; color:white; font-size:20px; cursor:pointer;">🎤</button>
      <button onclick="endCall()" style="background:#ea0038; border:none; width:60px; height:60px; border-radius:50%; color:white; font-size:24px; cursor:pointer;">📞</button>
      <button id="video-toggle-btn" onclick="toggleVideo()" style="background:#ffffff33; border:none; width:50px; height:50px; border-radius:50%; color:white; font-size:20px; cursor:pointer;">📹</button>
    </div>
  </div>

  <!-- Image Viewer Modal -->
  <div id="image-modal" class="overlay-screen hidden" onclick="closeImageModal()">
    <span style="position:absolute; top:20px; right:30px; font-size:30px; cursor:pointer;">&times;</span>
    <img id="modal-img" style="max-width:90%; max-height:90%; object-fit:contain;">
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="main.js"></script>
</body>
</html>
