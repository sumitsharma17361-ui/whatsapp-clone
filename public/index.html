<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Lite</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
  <!-- Jitsi External API Script -->
  <script src="https://meet.jit.si/external_api.js"></script>
</head>
<body>
  <div id="auth-screen" class="centered-container">
    <div class="card">
      <h2>WhatsApp Lite</h2>
      <input type="text" id="auth-username" placeholder="Username">
      <input type="password" id="auth-password" placeholder="Password">
      <div class="row" style="display: flex; gap: 10px; width: 100%;">
        <button onclick="authAction('/api/login')" style="flex: 1;">Login</button>
        <button onclick="authAction('/api/register')" class="btn-secondary" style="flex: 1;">Register</button>
      </div>
    </div>
  </div>

  <div id="app-screen" class="app-container hidden">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3 id="current-user-display">My Profile</h3>
        <button onclick="logout()" class="btn-small">Logout</button>
      </div>
      
      <div class="search-box">
        <input type="text" id="target-username" placeholder="Add friend username...">
        <button onclick="sendFriendRequest()">+</button>
      </div>

      <div class="section-title">Pending Requests</div>
      <div id="requests-list" class="list-container"></div>

      <div class="section-title">Chats</div>
      <div id="friends-list" class="list-container"></div>
    </div>

    <div class="chat-area mobile-hidden" id="chat-area">
      <div id="chat-placeholder" class="centered-container">
        <p>Select a friend to start chatting</p>
      </div>
      
      <div id="active-chat" class="chat-window hidden">
        <div class="chat-header" style="display: flex; align-items: center; justify-content: space-between;">
          <div style="display: flex; align-items: center; gap: 10px;">
            <button id="back-btn" onclick="toggleSidebar(true)">⬅</button>
            <div class="header-info">
              <span id="active-friend-name">Friend Name</span>
              <span id="active-friend-status" class="status-indicator">Offline</span>
            </div>
          </div>
          <!-- Calling Buttons -->
          <div style="display: flex; gap: 15px; margin-right: 10px;">
            <button onclick="startCall('audio')" style="background:transparent; font-size:20px; border:none; cursor:pointer;" title="Audio Call">📞</button>
            <button onclick="startCall('video')" style="background:transparent; font-size:20px; border:none; cursor:pointer;" title="Video Call">🎥</button>
          </div>
        </div>
        
        <div id="messages-display" class="messages-container"></div>
        
        <div class="chat-input-area">
          <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(this)">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
          <input type="text" id="message-input" placeholder="Type a message...">
          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Incoming Call Popup Notification -->
  <div id="incoming-call-box" style="display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #111b21; color: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 10000; align-items: center; gap: 20px; border: 1px solid #00a884; width: 90%; max-width: 340px; justify-content: space-between;">
    <div>
      <b id="incoming-caller-name" style="font-size: 15px;">User</b>
      <div id="incoming-call-type" style="font-size: 12px; color: #8696a0;">Incoming Call...</div>
    </div>
    <div style="display: flex; gap: 10px;">
      <button onclick="acceptCall()" style="background: #25d366; padding: 8px 16px; border-radius: 6px; border:none; color:white; font-weight:bold; cursor:pointer;">Accept</button>
      <button onclick="rejectCall()" style="background: #ea0038; padding: 8px 16px; border-radius: 6px; border:none; color:white; font-weight:bold; cursor:pointer;">Reject</button>
    </div>
  </div>

  <!-- Fullscreen Call Screen Frame -->
  <div id="call-screen-frame" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: black; z-index: 99999;"></div>

  <script src="main.js"></script>
</body>
</html>
