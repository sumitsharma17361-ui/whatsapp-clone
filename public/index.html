<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WhatsApp Ultra Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="light-theme">

  <div id="image-modal" class="modal-overlay hidden" onclick="closeImageModal()">
    <span class="modal-close">&times;</span>
    <img id="modal-img" class="modal-content">
  </div>

  <!-- CALL SCREEN / MODAL -->
  <div id="call-screen" class="modal-overlay hidden" style="background: #111b21; z-index: 3000; flex-direction: column; justify-content: space-between; padding: 30px;">
    <div style="display: flex; flex-direction: column; align-items: center; margin-top: 40px;">
      <img id="call-avatar" src="https://www.w3schools.com/howto/img_avatar.png" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #00a884; margin-bottom: 15px;">
      <h2 id="call-username" style="color: white; font-size: 22px;">Calling...</h2>
      <p id="call-status-text" style="color: #8696a0; font-size: 14px; margin-top: 5px;">Ringing...</p>
    </div>

    <!-- Video Streams Container -->
    <div id="video-container" style="display: flex; gap: 10px; width: 100%; height: 50vh; justify-content: center; position: relative;" class="hidden">
      <video id="remote-video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px; background: #000;"></video>
      <video id="local-video" autoplay playsinline muted style="width: 120px; height: 160px; object-fit: cover; border-radius: 8px; position: absolute; bottom: 15px; right: 15px; border: 2px solid white; background: #000;"></video>
    </div>

    <!-- Call Controls -->
    <div style="display: flex; gap: 30px; justify-content: center; align-items: center; margin-bottom: 30px;">
      <button onclick="toggleMute()" id="mute-btn" class="call-control-btn" title="Mute Mic">🎤</button>
      <button onclick="endCall()" class="call-control-btn" style="background: #ea0038; color: white;" title="End Call">📞</button>
      <button onclick="toggleVideo()" id="video-toggle-btn" class="call-control-btn" title="Toggle Camera">📹</button>
    </div>
  </div>

  <!-- INCOMING CALL RINGING MODAL -->
  <div id="incoming-call-modal" class="modal-overlay hidden" style="background: rgba(0,0,0,0.85); z-index: 3500;">
    <div class="card" style="background: var(--card-bg); width: 320px; padding: 30px;">
      <h3 style="color: var(--text-primary); margin-bottom: 10px;">Incoming Call...</h3>
      <p id="incoming-caller-name" style="font-size: 18px; font-weight: bold; color: #00a884; margin-bottom: 20px;"></p>
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button onclick="acceptIncomingCall()" class="btn-primary" style="background: #25d366; flex: 1;">Accept</button>
        <button onclick="rejectIncomingCall()" class="btn-secondary" style="background: #ea0038; flex: 1;">Reject</button>
      </div>
    </div>
  </div>

  <div id="auth-screen" class="centered-container">
    <div class="card">
      <h2 class="auth-title">WhatsApp Ultra</h2>
      <input type="text" id="auth-username" placeholder="Username">
      <input type="password" id="auth-password" placeholder="Password">
      <div class="row" style="display: flex; gap: 10px; width: 100%; margin-top:15px;">
        <button onclick="authAction('login')" class="btn-primary" style="flex: 1;">Login</button>
        <button onclick="authAction('register')" class="btn-secondary" style="flex: 1;">Register</button>
      </div>
    </div>
  </div>

  <div id="app-screen" class="app-container hidden">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="profile-info">
          <input type="file" id="avatar-input" style="display:none;" accept="image/*" onchange="uploadProfilePic(this)">
          <img id="my-avatar" src="https://www.w3schools.com/howto/img_avatar.png" onclick="document.getElementById('avatar-input').click()" title="Click to change profile picture" class="avatar-img">
          <h3 id="current-user-display">SUMIT</h3>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <button onclick="toggleTheme()" class="btn-theme-toggle" title="Toggle Dark/Light Mode">🌙</button>
          <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
      </div>

      <div class="sidebar-tabs" style="display: flex; background: var(--header-bg); border-bottom: 1px solid var(--border-color);">
        <button onclick="switchTab('chats')" class="tab-btn active" id="tab-chats-btn" style="flex:1; padding:10px; border:none; background:transparent; font-weight:bold; cursor:pointer; color:var(--text-primary); border-bottom:2px solid #00a884;">Chats</button>
        <button onclick="switchTab('status')" class="tab-btn" id="tab-status-btn" style="flex:1; padding:10px; border:none; background:transparent; font-weight:bold; cursor:pointer; color:var(--text-secondary);">Status</button>
      </div>
      
      <div class="search-box">
        <input type="text" id="target-username" placeholder="Add friend username...">
        <button onclick="sendFriendRequest()" class="btn-add">+</button>
      </div>

      <div class="sidebar-scroll">
        <div id="friends-list" class="list-container">
          <div class="section-title">PENDING REQUESTS</div>
          <div id="requests-list" class="list-container"></div>
          <div class="section-title">CHATS</div>
          <div id="chats-sublist"></div>
        </div>

        <div id="status-view-container" class="list-container hidden">
          <input type="file" id="status-file-input" style="display:none;" accept="image/*,video/*" onchange="uploadStatusMedia(this)">
          
          <div class="list-item" onclick="openStatusCreator()">
            <div style="display:flex; align-items:center; gap:10px;">
              <div style="position:relative;">
                <img id="my-status-avatar" src="https://www.w3schools.com/howto/img_avatar.png" style="width:38px; height:38px; border-radius:50%; object-fit:cover;">
                <span style="position:absolute; bottom:0; right:0; background:#00a884; color:white; border-radius:50%; width:16px; height:16px; font-size:12px; display:flex; align-items:center; justify-content:center;">T</span>
              </div>
              <div>
                <span style="font-weight:600; display:block;">Create Text Status</span>
                <span style="font-size:12px; color:var(--text-secondary);">Tap to write a text status</span>
              </div>
            </div>
          </div>

          <div class="list-item" onclick="document.getElementById('status-file-input').click()">
            <div style="display:flex; align-items:center; gap:10px;">
              <div style="position:relative;">
                <img src="https://www.w3schools.com/howto/img_avatar.png" style="width:38px; height:38px; border-radius:50%; object-fit:cover;">
                <span style="position:absolute; bottom:0; right:0; background:#00a884; color:white; border-radius:50%; width:16px; height:16px; font-size:12px; display:flex; align-items:center; justify-content:center;">+</span>
              </div>
              <div>
                <span style="font-weight:600; display:block;">Photo/Video Status</span>
                <span style="font-size:12px; color:var(--text-secondary);">Tap to upload photo or video</span>
              </div>
            </div>
          </div>

          <div class="section-title">RECENT UPDATES</div>
          <div id="statuses-list"></div>
        </div>
      </div>
    </div>

    <div class="chat-area mobile-hidden" id="chat-area">
      <div id="chat-placeholder" class="centered-container">
        <p>Select a friend to start chatting</p>
      </div>
      
      <div id="active-chat" class="chat-window hidden">
        <div class="chat-header">
          <div style="display: flex; align-items: center; gap: 10px; flex: 1;">
            <button id="back-btn" onclick="toggleSidebar(true)" class="btn-back">⬅</button>
            <img id="active-friend-avatar" src="https://www.w3schools.com/howto/img_avatar.png" class="avatar-img-chat">
            <div class="header-info">
              <span id="active-friend-name">Friend Name</span>
              <span id="active-friend-status" class="status-indicator">Offline</span>
            </div>
          </div>
          <div class="chat-header-actions">
            <button onclick="startCall('audio')" class="icon-btn" title="Audio Call">📞</button>
            <button onclick="startCall('video')" class="icon-btn" title="Video Call">📹</button>
            <input type="text" id="in-chat-search" placeholder="Search in chat..." oninput="searchInChat(this.value)" class="chat-search-input hidden">
            <button onclick="toggleInChatSearch()" class="icon-btn" title="Search Message">🔍</button>
            <button onclick="clearFullChat()" class="icon-btn" title="Clear Chat" style="color:#ea0038;">🗑️</button>
          </div>
        </div>
        
        <div id="messages-display" class="messages-container"></div>
        
        <div id="reply-preview-bar" class="reply-preview-bar hidden">
          <div style="flex:1;">
            <span style="font-size:11px; font-weight:bold; color:#00a884;">Replying to:</span>
            <p id="reply-preview-text" style="font-size:13px; margin-top:2px; color:var(--text-primary); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;"></p>
          </div>
          <button onclick="cancelReply()" style="background:transparent; border:none; font-size:16px; cursor:pointer; color:var(--text-secondary);">✕</button>
        </div>

        <div class="chat-input-area">
          <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(this)">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach file">📎</button>
          <input type="text" id="message-input" placeholder="Type a message..." oninput="handleTyping()">
          <button id="mic-btn" class="mic-btn" title="Voice Note">🎙️</button>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
