<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Lite</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="auth-screen" class="centered-container">
    <div class="card">
      <h2>WhatsApp Lite</h2>
      <input type="text" id="auth-username" placeholder="Username">
      <input type="password" id="auth-password" placeholder="Password">
      <div class="row" style="display: flex; gap: 10px; width: 100%;">
        <button onclick="authAction('/api/login')" style="flex: 1;">Login</button>
        <button onclick="authAction('/api/register')" class="btn-secondary" style="flex: 1;">Register</button>
      </div>
    </div>
  </div>

  <div id="app-screen" class="app-container hidden">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3 id="current-user-display">My Profile</h3>
        <button onclick="logout()" class="btn-small">Logout</button>
      </div>
      <div class="search-box">
        <input type="text" id="target-username" placeholder="Add friend username...">
        <button onclick="sendFriendRequest()">+</button>
      </div>
      <div class="section-title">Pending Requests</div>
      <div id="requests-list" class="list-container"></div>
      <div class="section-title">Chats</div>
      <div id="friends-list" class="list-container"></div>
    </div>

    <div class="chat-area mobile-hidden" id="chat-area">
      <div id="chat-placeholder" class="centered-container">
        <p>Select a friend to start chatting</p>
      </div>
      
      <div id="active-chat" class="chat-window hidden">
        <div class="chat-header" style="display: flex; align-items: center; justify-content: space-between;">
          <div style="display: flex; align-items: center; gap: 10px;">
            <button id="back-btn" onclick="toggleSidebar(true)">⬅</button>
            <div class="header-info">
              <span id="active-friend-name">Friend Name</span>
              <span id="active-friend-status" class="status-indicator">Offline</span>
            </div>
          </div>
          <!-- Pure Native Call Trigger Controls -->
          <div style="display: flex; gap: 18px; margin-right: 15px;">
            <button onclick="makeNativeCall('audio')" style="background:transparent; font-size:22px; border:none; cursor:pointer;">📞</button>
            <button onclick="makeNativeCall('video')" style="background:transparent; font-size:22px; border:none; cursor:pointer;">🎥</button>
          </div>
        </div>
        
        <div id="messages-display" class="messages-container"></div>
        
        <div class="chat-input-area">
          <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(this)">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
          <input type="text" id="message-input" placeholder="Type a message...">
          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Real WhatsApp Style Full Screen Native Call Layer UI Container -->
  <div id="native-call-overlay" style="display: none; position: fixed; top:0; left:0; width:100vw; height:100dvh; background:#111b21; z-index:999999; flex-direction:column; align-items:center; justify-content:space-between; padding:50px 20px; color:white; font-family:sans-serif;">
    <div style="text-align:center; margin-top:40px;">
      <h1 id="native-call-user" style="font-size:32px; font-weight:normal; margin-bottom:10px;">User Name</h1>
      <div id="native-call-status" style="font-size:16px; color:#8696a0; letter-spacing:1px;">Ringing...</div>
    </div>

    <!-- Video Rendering Grid Area -->
    <div id="native-video-box" style="display:none; width:100%; max-width:360px; height:50vh; background:#1f2c34; border-radius:16px; overflow:hidden; position:relative;">
       <video id="native-remote-stream" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
       <video id="native-local-stream" autoplay playsinline muted style="position:absolute; bottom:15px; right:15px; width:90px; height:120px; object-fit:cover; border-radius:8px; border:2px solid #fff;"></video>
    </div>

    <!-- Interactive Call System Button State Areas -->
    <div id="native-incoming-ui" style="display:none; gap:50px; margin-bottom:30px;">
       <button onclick="acceptNativeCall()" style="background:#25d366; width:65px; height:65px; border-radius:50%; font-size:26px; padding:0; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 15px rgba(37,211,102,0.4);">📞</button>
       <button onclick="hangupNativeCall()" style="background:#ea0038; width:65px; height:65px; border-radius:50%; font-size:26px; padding:0; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 15px rgba(234,0,56,0.4);">🛑</button>
    </div>

    <div id="native-active-ui" style="display:block; margin-bottom:30px;">
       <button onclick="hangupNativeCall()" style="background:#ea0038; width:65px; height:65px; border-radius:50%; font-size:26px; padding:0; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 15px rgba(234,0,56,0.3);">🛑</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
